    <script>
const API_KEY = "AIzaSyDjxmd8kV-I0IJl_0Pmlo-bluTt6s4YZxs";
const MASTER_SHEET_ID = "1vYFBN66bOciRX_-Ic9DHoJ3exbxWq3VU0lkrNkylb3o";
const MASTER_RANGE = "A2:C"; // No. of districts, district name, full Google Sheet link

function getSheetIdFromUrl(url) {
    const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
    return match ? match[1] : null;
}

function loadMapDataFromMaster(callback) {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${MASTER_SHEET_ID}/values/${MASTER_RANGE}?key=${API_KEY}`;
    $.getJSON(url, function(data) {
        const rows = data.values || [];
        let mapData = {};
        rows.forEach(row => {
            const districtName = row[1]?.trim();
            const sheetUrl = row[2]?.trim();
            const sheetId = getSheetIdFromUrl(sheetUrl);
            if (districtName && sheetId) {
                const id = districtName.toLowerCase().replace(/\s+/g, '');
                mapData[id] = {
                    mapSpreadSheetId: sheetId,
                    name: districtName,
                    mapContainerId: id
                };
            }
        });
        callback(mapData);
    }).fail(err => {
        console.error("Failed to load master sheet:", err);
        alert("Error loading master sheet data. Check console for details.");
    });
}

function buildNavAndTabs(MAP_DATA) {
    const navList = $("#navbar .nav-pills");
    const tabContent = $(".tab-content");
    navList.empty();
    tabContent.empty();
    let first = true;

    Object.values(MAP_DATA).forEach(district => {
        // Create navigation tab
        const navItem = $(`
            <li role="presentation" ${first ? 'class="active"' : ''}>
                <a href="#/kerala/${district.mapContainerId}" 
                   role="tab" 
                   data-target="#${district.mapContainerId}" 
                   data-toggle="tab">${district.name}</a>
            </li>
        `);
        navList.append(navItem);

        // Create corresponding map container tab pane
        const tabPane = $(`
            <div role="tabpanel" 
                 class="tab-pane map-container ${first ? 'active' : ''}" 
                 id="${district.mapContainerId}"></div>
        `);
        tabContent.append(tabPane);

        first = false;
    });
}

loadMapDataFromMaster(function(MAP_DATA) {
    console.log("Loaded MAP_DATA:", MAP_DATA);
    buildNavAndTabs(MAP_DATA);
    // Now you can initialize maps for each district
    // Example: initMaps(MAP_DATA);
});
</script>
